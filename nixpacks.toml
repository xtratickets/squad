providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
# Cache dev dependencies (tsc, vite) in this layer, but ignore scripts to skip heavy binaries
cmds = [
  "npm install --no-optional --ignore-scripts",
  "cd frontend && npm install --ignore-scripts"
]

[phases.build]
# Build everything using the root scripts now that tools are installed
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npx prisma migrate deploy && npm run start:prod"