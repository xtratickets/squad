[phases.setup]
nixPkgs = ["nodejs", "openssl"]

[phases.install]
cmds = ["npm ci", "npm run ci:frontend"]

[phases.build]
cmds = ["npm run build:frontend", "npx prisma generate", "rm -rf dist && npx tsc"]

[start]
cmd = "npx prisma migrate resolve --rolled-back 20260220123408_init && npx prisma migrate deploy && npm run start:all"
