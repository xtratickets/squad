providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
# Use npm ci for reproducible builds and better caching
# Only install production dependencies to reduce layer size
cmds = [
  "npm ci --omit=dev --prefer-offline --no-audit",
  "cd frontend && npm ci --omit=dev --prefer-offline --no-audit"
]

[phases.build]
# Build everything using the root scripts now that tools are installed
# Install dev-dependencies only for build phase (isolated)
cmds = [
  "npm install --prefer-offline --no-audit",
  "cd frontend && npm install --prefer-offline --no-audit",
  "npx prisma generate",
  "npm run build"
]

[start]
# Skip prisma generate on startup (done in build), only run migrations
cmd = "npx prisma migrate deploy --skip-generate && npm run start:prod"