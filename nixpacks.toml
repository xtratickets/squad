providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
# Skip heavy Electron dependencies and scripts in production
cmds = ["npm install --omit=dev --no-optional --ignore-scripts", "cd frontend && npm install --omit=dev --ignore-scripts"]

# Generate prisma first, then build all
cmds = ["npx prisma generate", "rm -rf dist && npm run build"]

[start]
cmd = "npx prisma migrate resolve --rolled-back 20260220123408_init && npx prisma migrate deploy && npm run start:all"